<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STREETCODE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;font-family:'Courier New',monospace;overflow:hidden;user-select:none;}
#canvas{display:block;cursor:none;}

/* ── SCREENS ── */
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;}
#title-screen{background:#0a0a0a;}
#title-screen h1{font-size:clamp(40px,8vw,80px);color:#fff;letter-spacing:14px;margin-bottom:6px;}
#title-screen h1 span{color:#ffcc00;}
.tagline{color:#555;font-size:12px;letter-spacing:4px;margin-bottom:36px;}
.menu-btn{background:transparent;border:1px solid #333;color:#fff;font-family:'Courier New',monospace;font-size:13px;letter-spacing:3px;padding:11px 36px;cursor:pointer;margin:5px;transition:.15s;text-transform:uppercase;}
.menu-btn:hover{background:#ffcc00;color:#000;border-color:#ffcc00;}
.menu-btn.secondary{border-color:#222;color:#555;font-size:11px;}
.menu-btn.secondary:hover{background:#222;color:#fff;border-color:#444;}
input.txt{background:transparent;border:none;border-bottom:1px solid #333;color:#fff;font-family:'Courier New',monospace;font-size:16px;letter-spacing:3px;padding:8px 4px;outline:none;text-align:center;width:220px;margin-bottom:28px;}
input.txt::placeholder{color:#333;}
.skin-row{display:flex;gap:10px;margin-bottom:28px;}
.skin-dot{width:44px;height:44px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:.15s;position:relative;}
.skin-dot:hover,.skin-dot.sel{border-color:#fff;transform:scale(1.1);}
.mode-row{display:flex;gap:10px;margin-bottom:28px;}
.mode-btn{background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;padding:8px 16px;cursor:pointer;transition:.15s;}
.mode-btn.sel{border-color:#ffcc00;color:#ffcc00;}
.lbl{font-size:10px;color:#444;letter-spacing:2px;margin-bottom:10px;}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#hp-wrap{position:absolute;bottom:22px;left:20px;}
#sh-wrap{position:absolute;bottom:48px;left:20px;}
.bar-lbl{font-size:9px;color:#666;letter-spacing:1px;margin-bottom:2px;}
.bar-bg{width:160px;height:8px;background:#111;border-radius:4px;overflow:hidden;}
#hp-fill{height:100%;background:#dd3333;border-radius:4px;transition:width .1s;}
#sh-fill{height:100%;background:#3366dd;border-radius:4px;transition:width .1s;}
#ammo{position:absolute;bottom:22px;right:20px;text-align:right;color:#fff;font-size:22px;font-weight:bold;}
#gun-lbl{font-size:9px;color:#555;letter-spacing:2px;}
#dash-lbl{position:absolute;bottom:54px;right:20px;font-size:9px;letter-spacing:1px;color:#666;text-align:right;}
#dash-lbl.rdy{color:#44ff88;}
#kill-feed{position:absolute;top:14px;right:14px;text-align:right;}
.kf-entry{font-size:11px;color:#ffcc44;background:rgba(0,0,0,.6);padding:3px 8px;border-radius:2px;margin-bottom:3px;animation:kfFade 3s forwards;}
@keyframes kfFade{0%,70%{opacity:1}100%{opacity:0}}
#reload-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;letter-spacing:3px;color:#ffcc44;opacity:0;transition:.2s;pointer-events:none;}
#reload-lbl.show{opacity:1;}
#zone-warn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;letter-spacing:3px;color:#ff4444;opacity:0;transition:.3s;pointer-events:none;}
#zone-warn.show{opacity:1;}
#score-top{position:absolute;top:12px;left:50%;transform:translateX(-50%);text-align:center;font-size:11px;color:#777;letter-spacing:2px;}
#kill-num{font-size:26px;color:#ffcc00;font-weight:bold;}
#inv-wrap{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;}
.inv-slot{width:38px;height:38px;border:1px solid #333;background:#111;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:#444;}
.inv-slot.filled{border-color:#555;color:#fff;}
#golden-bar-wrap{position:absolute;bottom:68px;left:20px;display:none;}
#golden-fill{height:8px;background:#ffcc00;border-radius:4px;transition:width .1s;}

/* ── CHAT ── */
#chat-wrap{position:fixed;bottom:80px;left:14px;width:280px;z-index:20;display:flex;flex-direction:column;gap:0;}
#chat-tabs{display:flex;gap:3px;margin-bottom:3px;}
.ctab{font-size:9px;letter-spacing:1px;padding:4px 8px;border:1px solid #222;color:#555;cursor:pointer;background:transparent;font-family:'Courier New',monospace;}
.ctab.active{border-color:#444;color:#fff;background:#111;}
#chat-box{background:rgba(0,0,0,.75);border:1px solid #1a1a1a;padding:8px;height:120px;overflow-y:auto;font-size:10px;line-height:1.5;}
#chat-box::-webkit-scrollbar{width:3px;}
#chat-box::-webkit-scrollbar-thumb{background:#333;}
.chat-msg{margin-bottom:2px;}
.chat-name{color:#ffcc44;}
.chat-dm-name{color:#44ccff;}
#chat-input-row{display:flex;gap:0;}
#chat-in{flex:1;background:#0d0d0d;border:1px solid #1a1a1a;border-top:none;color:#ccc;font-family:'Courier New',monospace;font-size:10px;padding:5px 8px;outline:none;}
#chat-send{background:#111;border:1px solid #1a1a1a;border-left:none;border-top:none;color:#555;font-family:'Courier New',monospace;font-size:9px;padding:5px 8px;cursor:pointer;}
#chat-send:hover{color:#fff;}
#chat-toggle{position:fixed;bottom:80px;left:14px;z-index:21;font-size:9px;letter-spacing:2px;padding:4px 8px;background:#0a0a0a;border:1px solid #1a1a1a;color:#444;cursor:pointer;display:none;}

/* ── ESC MENU ── */
#esc-menu{position:fixed;top:0;right:0;width:300px;height:100%;background:#0d0d0d;border-left:1px solid #1a1a1a;z-index:40;display:none;flex-direction:column;}
#esc-menu.open{display:flex;}
#esc-hdr{padding:20px 20px 12px;border-bottom:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;}
#esc-hdr h2{font-size:11px;letter-spacing:3px;color:#fff;}
#esc-close{background:transparent;border:none;color:#555;font-size:16px;cursor:pointer;}
#esc-close:hover{color:#fff;}
#esc-player-list{flex:1;overflow-y:auto;padding:10px 0;}
.esc-player{display:flex;align-items:center;padding:8px 20px;gap:10px;border-bottom:1px solid #111;}
.esc-player:hover{background:#111;}
.esc-pname{flex:1;font-size:11px;letter-spacing:1px;color:#ccc;}
.esc-pname.dead{color:#444;}
.esc-btn{font-size:8px;letter-spacing:1px;padding:3px 7px;border:1px solid #222;color:#555;cursor:pointer;background:transparent;font-family:'Courier New',monospace;}
.esc-btn:hover{color:#fff;border-color:#555;}
.esc-btn.muted{color:#ff4444;border-color:#ff4444;}
#esc-btns{padding:16px 20px;border-top:1px solid #1a1a1a;display:flex;flex-direction:column;gap:8px;}

/* ── VOICE ── */
#voice-bar{position:fixed;top:14px;left:14px;z-index:20;display:flex;gap:6px;align-items:center;}
#mic-btn{font-size:9px;letter-spacing:1px;padding:5px 10px;border:1px solid #222;color:#555;cursor:pointer;background:#0a0a0a;font-family:'Courier New',monospace;}
#mic-btn.active{border-color:#44ff88;color:#44ff88;}
#mic-btn.muted{border-color:#ff4444;color:#ff4444;}
.voice-indicator{font-size:9px;color:#333;letter-spacing:1px;}

/* ── DEATH / GAME OVER ── */
#death-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:45;display:none;flex-direction:column;align-items:center;justify-content:center;}
#death-screen h2{color:#cc2222;font-size:48px;letter-spacing:10px;margin-bottom:20px;}
#gameover-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:45;display:none;flex-direction:column;align-items:center;justify-content:center;}
#gameover-screen h2{color:#ffcc00;font-size:36px;letter-spacing:6px;margin-bottom:8px;}
#gameover-winner{color:#fff;font-size:14px;letter-spacing:3px;margin-bottom:28px;}

/* MINIMAP */
#minimap{position:absolute;top:12px;left:12px;width:120px;height:90px;border:1px solid #1a1a1a;background:rgba(0,0,0,.6);}
</style>
</head>
<body>

<!-- CANVAS -->
<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="minimap"></div>
  <div id="voice-bar">
    <button id="mic-btn" onclick="toggleMic()">MIC OFF</button>
    <span class="voice-indicator" id="voice-status"></span>
  </div>
  <div id="score-top">KILLS: <span id="kill-num">0</span></div>
  <div id="kill-feed"></div>
  <div id="golden-bar-wrap"><div class="bar-lbl">GOLDEN POWER</div><div class="bar-bg"><div id="golden-fill" style="width:100%"></div></div></div>
  <div id="sh-wrap"><div class="bar-lbl">SHIELD</div><div class="bar-bg"><div id="sh-fill" style="width:0%"></div></div></div>
  <div id="hp-wrap"><div class="bar-lbl">HEALTH</div><div class="bar-bg"><div id="hp-fill" style="width:100%"></div></div></div>
  <div id="ammo"><div id="gun-lbl">DEFAULT GUN</div><span id="ammo-cur">30</span>/<span id="ammo-max">30</span></div>
  <div id="dash-lbl" class="rdy">[SHIFT] DASH</div>
  <div id="inv-wrap"><div class="inv-slot" id="inv0">EMPTY</div><div class="inv-slot" id="inv1">EMPTY</div></div>
  <div id="reload-lbl">RELOADING...</div>
  <div id="zone-warn">⚠ LEAVE THE ZONE</div>
</div>

<!-- CHAT -->
<div id="chat-toggle" onclick="toggleChat()">CHAT [T]</div>
<div id="chat-wrap">
  <div id="chat-tabs">
    <button class="ctab active" id="tab-global" onclick="switchTab('global')">GLOBAL</button>
    <div id="dm-tabs"></div>
  </div>
  <div id="chat-box"></div>
  <div id="chat-input-row">
    <input id="chat-in" type="text" placeholder="Press T to chat..." maxlength="200" autocomplete="off">
    <button id="chat-send" onclick="sendChat()">SEND</button>
  </div>
</div>

<!-- ESC MENU -->
<div id="esc-menu">
  <div id="esc-hdr"><h2>PLAYERS</h2><button id="esc-close" onclick="closeEsc()">✕</button></div>
  <div id="esc-player-list"></div>
  <div id="esc-btns">
    <button class="menu-btn secondary" onclick="closeEsc()">RESUME [ESC]</button>
    <button class="menu-btn secondary" onclick="leaveGame()">LEAVE GAME</button>
  </div>
</div>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen">
  <h1>STREET<span>CODE</span></h1>
  <div class="tagline">MULTIPLAYER BROWSER SHOOTER</div>
  <div class="lbl">YOUR NAME</div>
  <input class="txt" id="name-in" type="text" placeholder="ENTER NAME" maxlength="12" spellcheck="false">
  <div class="lbl">CHOOSE SKIN</div>
  <div class="skin-row" id="skin-row"></div>
  <div class="lbl">GAME MODE</div>
  <div class="mode-row">
    <button class="mode-btn sel" id="mode-ffa" onclick="selectMode('ffa')">FFA</button>
    <button class="mode-btn" id="mode-br" onclick="selectMode('br')">BATTLE ROYALE</button>
    <button class="mode-btn" id="mode-zone" onclick="selectMode('zone')">ZONE CTRL</button>
  </div>
  <button class="menu-btn" onclick="joinGame()">JOIN GAME</button>
  <div style="margin-top:20px;font-size:10px;color:#333;letter-spacing:2px;">OPEN IN MULTIPLE TABS TO TEST MULTIPLAYER</div>
</div>

<!-- DEATH -->
<div id="death-screen">
  <h2>YOU DIED</h2>
  <button class="menu-btn" onclick="respawn()">RESPAWN</button>
  <button class="menu-btn secondary" onclick="leaveGame()">LEAVE</button>
</div>

<!-- GAME OVER -->
<div id="gameover-screen">
  <h2>GAME OVER</h2>
  <div id="gameover-winner"></div>
  <button class="menu-btn" onclick="leaveGame()">BACK TO MENU</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============================================================
// STREETCODE — Full Multiplayer Client
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;
window.addEventListener('resize', () => { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; });

// ── CONSTANTS ──────────────────────────────────────────────
const WORLD_W = 2400, WORLD_H = 1800;
const SKINS = [
  {name:'Classic Red', color:'#cc3333', bullet:'#ff6666'},
  {name:'Midnight',    color:'#222244', bullet:'#aaaaff'},
  {name:'Ice',         color:'#ddeeff', bullet:'#88ccff'},
  {name:'Volt',        color:'#cccc00', bullet:'#ffff44'},
  {name:'Ocean',       color:'#1155aa', bullet:'#44aaff'},
  {name:'Flame',       color:'#cc5500', bullet:'#ff8822'},
  {name:'Phantom',     color:'#551177', bullet:'#cc66ff'},
  {name:'Gold',        color:'#ccaa00', bullet:'#ffdd44'},
];
const GOLDEN_COLORS = {plasma:'#00eeff', web:'#ffffff', blade:'#ff44ff'};
const WEAPON_AMMO = {default:{ammo:30,max:30,reload:500,name:'DEFAULT GUN'}, shotgun:{ammo:5,max:5,reload:2500,name:'SHOTGUN'}, bounce:{ammo:15,max:15,reload:1500,name:'BOUNCE GUN'}, plasma:{ammo:999,max:999,reload:0,name:'PLASMA CORE'}, web:{ammo:999,max:999,reload:0,name:'WEB PHANTOM'}, blade:{ammo:999,max:999,reload:0,name:'BLADE RANGER'}};
const FIRE_RATE = {default:125, shotgun:1200, bounce:250, plasma:80, web:200, blade:800};

// ── STATE ──────────────────────────────────────────────────
let socket, sessionId, myId;
let gameRunning = false;
let selectedSkin = 0, selectedMode = 'ffa';
let walls = [], lootItems = [], remotePlayers = {}, bullets = [];
let particles = [], floatingTexts = [];
let camera = {x:0, y:0};
let keys = {}, mouse = {x:0, y:0, down:false};

let myPlayer = null;
let kills = 0;
let lastShot = 0, reloading = false, reloadTimer = 0;
let dashCooldown = 0, dashActive = false;
let inventory = [null, null];
let currentWeapon = 'default';
let weaponAmmo = {default:30, shotgun:5, bounce:15, plasma:999, web:999, blade:999};
let goldenActive = null, goldenTimer = 0;
let escOpen = false, chatOpen = true, chatTyping = false;
let currentTab = 'global'; // 'global' or dmId
let dmTabs = {}; // id -> {name, msgs}
let mutedPlayers = new Set();

// Voice
let localStream = null, micActive = false;
let peerConnections = {}; // peerId -> RTCPeerConnection
let remoteAudios = {}; // peerId -> Audio element

// ── BUILD TITLE ─────────────────────────────────────────────
const skinRow = document.getElementById('skin-row');
SKINS.forEach((s,i) => {
  const d = document.createElement('div');
  d.className = 'skin-dot' + (i===0?' sel':'');
  d.style.background = s.color;
  d.title = s.name;
  d.onclick = () => { document.querySelectorAll('.skin-dot').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); selectedSkin = i; };
  skinRow.appendChild(d);
});

function selectMode(m) {
  selectedMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('mode-'+m).classList.add('sel');
}

// ── JOIN ────────────────────────────────────────────────────
function joinGame() {
  const name = document.getElementById('name-in').value.trim().toUpperCase() || 'PLAYER';
  socket = io();
  setupSocket();
  socket.emit('join', { name, skin: selectedSkin, mode: selectedMode });
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('chat-toggle').style.display = 'block';
}

// ── SOCKET EVENTS ──────────────────────────────────────────
function setupSocket() {
  socket.on('joined', data => {
    sessionId = data.sessionId;
    myId = data.playerId;
    walls = data.walls;
    lootItems = data.loot;
    const sp = {x: data.spawnX, y: data.spawnY};
    myPlayer = {x:sp.x, y:sp.y, angle:0, hp:150, shield:0, alive:true};
    camera.x = sp.x - W/2; camera.y = sp.y - H/2;
    // Add existing players
    data.players.forEach(p => { if(p.id !== myId) remotePlayers[p.id] = p; });
    gameRunning = true;
    updateHUD();
    requestAnimationFrame(gameLoop);
    // Voice: signal existing peers
    Object.keys(remotePlayers).forEach(pid => initVoicePeer(pid, true));
  });

  socket.on('state', data => {
    Object.entries(data.players).forEach(([id, ps]) => {
      if (id === myId) return;
      if (!remotePlayers[id]) remotePlayers[id] = {};
      Object.assign(remotePlayers[id], ps);
    });
    if (data.zone) currentZone = data.zone;
    // Bullets from server not needed (we render locally from bullets_fired)
  });

  socket.on('player_joined', p => {
    remotePlayers[p.id] = p;
    addKillFeed(p.name + ' joined', '#888');
    initVoicePeer(p.id, false);
    refreshEscList();
  });

  socket.on('player_left', ({id, name}) => {
    delete remotePlayers[id];
    addKillFeed(name + ' left', '#555');
    closePeer(id);
    refreshEscList();
  });

  socket.on('player_killed', ({killedId, killedName, killerName}) => {
    if (killedId === myId) {
      myPlayer.alive = false;
      document.getElementById('death-screen').style.display = 'flex';
    } else if (remotePlayers[killedId]) {
      remotePlayers[killedId].alive = false;
    }
    addKillFeed(killerName + ' → ' + killedName, killerName === getMyName() ? '#ffcc44' : '#cc4444');
    if (killerName === getMyName()) { kills++; document.getElementById('kill-num').textContent = kills; }
  });

  socket.on('player_respawned', ({id, x, y}) => {
    if (remotePlayers[id]) { remotePlayers[id].x=x; remotePlayers[id].y=y; remotePlayers[id].alive=true; remotePlayers[id].hp=150; }
  });

  socket.on('player_damaged', ({id, hp, shield}) => {
    if (remotePlayers[id]) { remotePlayers[id].hp = hp; remotePlayers[id].shield = shield; }
  });

  socket.on('you_hit', ({hp, shield}) => {
    if (!myPlayer) return;
    myPlayer.hp = hp; myPlayer.shield = shield;
    updateHUD();
    if (hp < 50) document.getElementById('zone-warn').style.background = 'none';
  });

  socket.on('player_transformed', ({id, hero}) => {
    if (remotePlayers[id]) remotePlayers[id].golden = hero;
  });

  socket.on('bullets_fired', bullets_data => {
    bullets_data.forEach(b => {
      bullets.push({...b, life: 120});
    });
  });

  socket.on('loot_removed', id => { lootItems = lootItems.filter(l => l.id !== id); });
  socket.on('loot_spawned', l => { lootItems.push(l); });

  socket.on('weapon_changed', ({weapon}) => {
    currentWeapon = weapon;
    weaponAmmo[weapon] = WEAPON_AMMO[weapon].ammo;
    updateHUD();
  });

  socket.on('inventory_update', inv => { inventory = inv; updateInv(); });

  socket.on('golden_transform', ({hero}) => {
    goldenActive = hero;
    currentWeapon = hero;
    goldenTimer = 45000;
    document.getElementById('golden-bar-wrap').style.display = 'block';
    addKillFeed('⚡ YOU TRANSFORMED: ' + hero.toUpperCase(), '#ffcc00');
    updateHUD();
  });

  socket.on('golden_end', () => {
    goldenActive = null;
    currentWeapon = 'default';
    weaponAmmo.default = 30;
    goldenTimer = 0;
    document.getElementById('golden-bar-wrap').style.display = 'none';
    updateHUD();
  });

  socket.on('player_list', list => {
    renderEscList(list);
  });

  socket.on('chat_global', msg => {
    if (mutedPlayers.has(msg.fromId)) return;
    appendChat('global', msg.from, msg.message, false);
  });

  socket.on('chat_dm', msg => {
    const otherId = msg.fromId === myId ? msg.toId : msg.fromId;
    const otherName = msg.fromId === myId ? (remotePlayers[msg.toId]?.name || msg.toId) : msg.from;
    if (!dmTabs[otherId]) openDmTab(otherId, otherName);
    appendChat(otherId, msg.from, msg.message, true);
  });

  socket.on('game_over', ({winner}) => {
    document.getElementById('gameover-winner').textContent = winner + ' WINS!';
    document.getElementById('gameover-screen').style.display = 'flex';
  });

  // WebRTC signaling
  socket.on('voice_offer', async ({fromId, offer}) => {
    if (!localStream) return;
    const pc = createPeer(fromId);
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('voice_answer', {toId: fromId, answer});
  });
  socket.on('voice_answer', async ({fromId, answer}) => {
    const pc = peerConnections[fromId];
    if (pc) await pc.setRemoteDescription(answer);
  });
  socket.on('voice_ice', ({fromId, candidate}) => {
    const pc = peerConnections[fromId];
    if (pc) pc.addIceCandidate(candidate).catch(()=>{});
  });
}

let currentZone = {x:0, y:0, w:WORLD_W, h:WORLD_H, shrinking:false};
function getMyName() {
  return document.getElementById('name-in')?.value?.trim()?.toUpperCase() || 'PLAYER';
}

// ── VOICE CHAT ─────────────────────────────────────────────
async function toggleMic() {
  if (!micActive) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
      micActive = true;
      document.getElementById('mic-btn').textContent = 'MIC ON';
      document.getElementById('mic-btn').className = 'active';
      // Connect to existing peers
      Object.keys(remotePlayers).forEach(pid => initVoicePeer(pid, true));
    } catch(e) {
      document.getElementById('voice-status').textContent = 'MIC DENIED';
    }
  } else {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    localStream = null; micActive = false;
    Object.keys(peerConnections).forEach(closePeer);
    document.getElementById('mic-btn').textContent = 'MIC OFF';
    document.getElementById('mic-btn').className = '';
  }
}

function createPeer(peerId) {
  const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.onicecandidate = e => { if(e.candidate) socket.emit('voice_ice',{toId:peerId,candidate:e.candidate}); };
  pc.ontrack = e => {
    let audio = remoteAudios[peerId];
    if (!audio) { audio = new Audio(); audio.autoplay = true; remoteAudios[peerId] = audio; }
    audio.srcObject = e.streams[0];
    if (mutedPlayers.has(peerId)) audio.muted = true;
  };
  peerConnections[peerId] = pc;
  return pc;
}

async function initVoicePeer(peerId, asInitiator) {
  if (!localStream || peerConnections[peerId]) return;
  const pc = createPeer(peerId);
  if (asInitiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('voice_offer', {toId: peerId, offer});
  }
}

function closePeer(peerId) {
  if (peerConnections[peerId]) { peerConnections[peerId].close(); delete peerConnections[peerId]; }
  if (remoteAudios[peerId]) { remoteAudios[peerId].pause(); delete remoteAudios[peerId]; }
}

// ── CHAT ─────────────────────────────────────────────────
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-wrap').style.display = chatOpen ? 'flex' : 'none';
}

function switchTab(tabId) {
  currentTab = tabId;
  document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-global')?.classList.toggle('active', tabId==='global');
  if (dmTabs[tabId]) document.getElementById('dmtab-'+tabId)?.classList.add('active');
  renderChatBox();
}

function openDmTab(peerId, peerName) {
  if (dmTabs[peerId]) return;
  dmTabs[peerId] = {name: peerName, msgs: []};
  const btn = document.createElement('button');
  btn.className = 'ctab';
  btn.id = 'dmtab-'+peerId;
  btn.textContent = peerName.slice(0,8);
  btn.onclick = () => switchTab(peerId);
  document.getElementById('dm-tabs').appendChild(btn);
}

function appendChat(tabId, from, message, isDm) {
  if (tabId !== 'global' && !dmTabs[tabId]) return;
  const msgs = tabId === 'global' ? (globalMsgs) : dmTabs[tabId].msgs;
  msgs.push({from, message, isDm});
  if (msgs.length > 200) msgs.shift();
  if (currentTab === tabId) renderChatBox();
}

let globalMsgs = [];

function renderChatBox() {
  const box = document.getElementById('chat-box');
  const msgs = currentTab === 'global' ? globalMsgs : (dmTabs[currentTab]?.msgs || []);
  box.innerHTML = msgs.map(m =>
    `<div class="chat-msg"><span class="${m.isDm?'chat-dm-name':'chat-name'}">[${m.from}]</span> ${escHtml(m.message)}</div>`
  ).join('');
  box.scrollTop = box.scrollHeight;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sendChat() {
  const inp = document.getElementById('chat-in');
  const msg = inp.value.trim();
  if (!msg || !socket) return;
  inp.value = '';
  if (currentTab === 'global') {
    socket.emit('chat_global', {message: msg});
    appendChat('global', getMyName(), msg, false);
    globalMsgs.push({from: getMyName(), message: msg, isDm:false});
    renderChatBox();
  } else {
    socket.emit('chat_dm', {toId: currentTab, message: msg});
  }
}

// Dummy appendChat fix for global:
function appendChat(tabId, from, message, isDm) {
  if (tabId === 'global') {
    if (mutedPlayers.has(from)) return;
    globalMsgs.push({from, message, isDm});
    if (globalMsgs.length > 200) globalMsgs.shift();
  } else {
    if (!dmTabs[tabId]) return;
    dmTabs[tabId].msgs.push({from, message, isDm});
  }
  if (currentTab === tabId) renderChatBox();
}

// ── ESC MENU ───────────────────────────────────────────────
function openEsc() {
  escOpen = true;
  document.getElementById('esc-menu').classList.add('open');
  if (socket) socket.emit('request_player_list');
}
function closeEsc() {
  escOpen = false;
  document.getElementById('esc-menu').classList.remove('open');
}
function refreshEscList() { if (escOpen && socket) socket.emit('request_player_list'); }

function renderEscList(list) {
  const el = document.getElementById('esc-player-list');
  el.innerHTML = list.map(p => {
    const isMe = p.id === myId;
    const isMuted = mutedPlayers.has(p.id);
    return `<div class="esc-player">
      <span class="esc-pname ${p.alive?'':'dead'}">${p.name}${isMe?' (YOU)':''}</span>
      ${isMe?'':`<button class="esc-btn ${isMuted?'muted':''}" onclick="toggleMute('${p.id}')">${isMuted?'UNMUTE':'MUTE'}</button>`}
      ${isMe?'':`<button class="esc-btn" onclick="dmPlayer('${p.id}','${p.name}')">DM</button>`}
    </div>`;
  }).join('');
}

function toggleMute(peerId) {
  if (mutedPlayers.has(peerId)) {
    mutedPlayers.delete(peerId);
    if (remoteAudios[peerId]) remoteAudios[peerId].muted = false;
  } else {
    mutedPlayers.add(peerId);
    if (remoteAudios[peerId]) remoteAudios[peerId].muted = true;
  }
  if (socket) socket.emit('request_player_list');
}

function dmPlayer(peerId, peerName) {
  openDmTab(peerId, peerName);
  switchTab(peerId);
  closeEsc();
  if (!chatOpen) toggleChat();
}

function leaveGame() {
  if (socket) socket.disconnect();
  gameRunning = false;
  remotePlayers = {}; bullets = []; lootItems = []; particles = [];
  kills = 0; currentWeapon = 'default'; inventory = [null,null];
  document.getElementById('death-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  document.getElementById('chat-toggle').style.display = 'none';
  globalMsgs = []; dmTabs = {};
}

function respawn() {
  document.getElementById('death-screen').style.display = 'none';
  // Server auto-respawns in FFA/Zone mode; in BR this is a menu
}

// ── INPUT ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (chatTyping) {
    if (e.key === 'Enter') sendChat();
    if (e.key === 'Escape') { document.getElementById('chat-in').blur(); chatTyping = false; }
    return;
  }
  keys[e.code] = true;
  if (e.key === 'Escape') { escOpen ? closeEsc() : openEsc(); return; }
  if (e.key === 't' || e.key === 'T') { if(!chatOpen)toggleChat(); document.getElementById('chat-in').focus(); chatTyping = true; return; }
  if (!gameRunning || !myPlayer?.alive) return;
  if (e.code === 'KeyR') startReload();
  if (e.code === 'KeyE') socket?.emit('use_item');
  if (e.code === 'KeyF') tryPickup();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
document.getElementById('chat-in').addEventListener('focus', () => chatTyping = true);
document.getElementById('chat-in').addEventListener('blur', () => chatTyping = false);
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', () => { mouse.down = true; });
canvas.addEventListener('mouseup', () => { mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ── RELOAD ─────────────────────────────────────────────────
function startReload() {
  if (reloading || goldenActive) return;
  const wep = WEAPON_AMMO[currentWeapon];
  if (!wep || weaponAmmo[currentWeapon] === wep.max) return;
  reloading = true;
  reloadTimer = wep.reload;
  document.getElementById('reload-lbl').classList.add('show');
}

// ── PICKUP ─────────────────────────────────────────────────
function tryPickup() {
  if (!myPlayer) return;
  const range = 50;
  for (const loot of lootItems) {
    const dx = loot.x - myPlayer.x, dy = loot.y - myPlayer.y;
    if (Math.sqrt(dx*dx+dy*dy) < range) {
      socket?.emit('pickup_loot', {lootId: loot.id});
      return;
    }
  }
}

// ── PARTICLES ──────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random()*Math.PI*2, spd = 1+Math.random()*3;
    particles.push({x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:25+Math.random()*20, color, size:2+Math.random()*3});
  }
}

// ── HUD ────────────────────────────────────────────────────
function updateHUD() {
  if (!myPlayer) return;
  document.getElementById('hp-fill').style.width = (myPlayer.hp/150*100)+'%';
  document.getElementById('sh-fill').style.width = (myPlayer.shield/25*100)+'%';
  const wep = WEAPON_AMMO[currentWeapon] || WEAPON_AMMO.default;
  document.getElementById('ammo-cur').textContent = goldenActive ? '∞' : (weaponAmmo[currentWeapon] ?? wep.ammo);
  document.getElementById('ammo-max').textContent = goldenActive ? '∞' : wep.max;
  document.getElementById('gun-lbl').textContent = wep.name;
}
function updateInv() {
  const labels = {health:'HEALTH',shield:'SHIELD'};
  [0,1].forEach(i => {
    const slot = document.getElementById('inv'+i);
    slot.textContent = inventory[i] ? labels[inventory[i]] : 'EMPTY';
    slot.className = 'inv-slot' + (inventory[i] ? ' filled' : '');
  });
}
function addKillFeed(text, color) {
  const feed = document.getElementById('kill-feed');

  el.className = 'kf-entry';
  el.style.color = color||'#ffcc44';

// ── MAIN LOOP ──────────────────────────────────────────────
let lastTime = 0;
function gameLoop(ts) {
  if (!gameRunning) return;
  const dt = ts - lastTime; lastTime = ts;
  if (myPlayer?.alive && !chatTyping) update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  const p = myPlayer;

  // Movement
  let mx = 0, my = 0;
  if (keys['KeyA']||keys['ArrowLeft'])  mx -= 1;
  if (keys['KeyD']||keys['ArrowRight']) mx += 1;
  if (keys['KeyW']||keys['ArrowUp'])    my -= 1;
  if (keys['KeyS']||keys['ArrowDown'])  my += 1;
  const len = Math.sqrt(mx*mx+my*my)||1;
  const spd = goldenActive?3.8:3.2;
  let vx = (mx/len)*spd, vy = (my/len)*spd;

  // Dash
  if ((keys['ShiftLeft']||keys['ShiftRight']) && dashCooldown<=0 && (mx||my)) {
    vx *= 8; vy *= 8;
    dashCooldown = 2000;
    spawnParticles(p.x, p.y, SKINS[selectedSkin].color, 8);
    const di = document.getElementById('dash-lbl');
    di.className=''; di.textContent='DASH...';
  }
  if (dashCooldown>0) {
    dashCooldown -= dt;
    if(dashCooldown<=0){document.getElementById('dash-lbl').className='rdy';document.getElementById('dash-lbl').textContent='[SHIFT] DASH';}
    else document.getElementById('dash-lbl').textContent='DASH '+(dashCooldown/1000).toFixed(1)+'s';
  }

  p.x = Math.max(30, Math.min(WORLD_W-30, p.x + vx));
  p.y = Math.max(30, Math.min(WORLD_H-30, p.y + vy));
  resolveWalls(p);

  // Aim
  const wx = mouse.x + camera.x, wy = mouse.y + camera.y;
  p.angle = Math.atan2(wy - p.y, wx - p.x);

  // Shoot
  const now = Date.now();
  const fr = FIRE_RATE[currentWeapon]||125;
  if (mouse.down && now - lastShot >= fr) {
    if (reloading) { /* wait */ }
    else if (!goldenActive && (weaponAmmo[currentWeapon]||0) <= 0) { startReload(); }
    else {
      lastShot = now;
      if (!goldenActive) { weaponAmmo[currentWeapon] = Math.max(0, (weaponAmmo[currentWeapon]||30)-1); }
      socket?.emit('shoot', {angle: p.angle, weaponType: currentWeapon});
      updateHUD();
    }
  }

  // Reload timer
  if (reloading) {
    reloadTimer -= dt;
    if (reloadTimer <= 0) {
      reloading = false;
      const wep = WEAPON_AMMO[currentWeapon];
      if (wep) weaponAmmo[currentWeapon] = wep.max;
      document.getElementById('reload-lbl').classList.remove('show');
      updateHUD();
    }
  }

  // Golden timer
  if (goldenActive && goldenTimer > 0) {
    goldenTimer -= dt;
    document.getElementById('golden-fill').style.width = Math.max(0, goldenTimer/45000*100)+'%';
  }

  // Zone warning
  const inZone = p.x>=currentZone.x && p.x<=currentZone.x+currentZone.w && p.y>=currentZone.y && p.y<=currentZone.y+currentZone.h;
  document.getElementById('zone-warn').className = inZone?'':'show';

  // Sync to server (throttled)
  if (now % 50 < 55) socket?.emit('move', {x:p.x, y:p.y, angle:p.angle});

  // Camera
  camera.x = Math.max(0, Math.min(WORLD_W-W, p.x-W/2));
  camera.y = Math.max(0, Math.min(WORLD_H-H, p.y-H/2));

  // Bullets (local render)
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life<=0) { bullets.splice(i,1); continue; }
    let hw=false;
    for(const w of walls){if(b.x>w.x&&b.x<w.x+w.w&&b.y>w.y&&b.y<w.y+w.h){spawnParticles(b.x,b.y,'#888',3);hw=true;break;}}
    if(hw){bullets.splice(i,1);}
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p2 = particles[i];
    p2.x+=p2.vx; p2.y+=p2.vy; p2.vx*=0.9; p2.vy*=0.9; p2.life--;
    if(p2.life<=0) particles.splice(i,1);
  }

  // Loot pulse
  lootItems.forEach(l => { if(!l.pulse)l.pulse=Math.random()*Math.PI*2; l.pulse+=0.05; });
}

function resolveWalls(entity) {
  const hw=11, hh=11;
  for(const w of walls){
    if(entity.x-hw<w.x+w.w&&entity.x+hw>w.x&&entity.y-hh<w.y+w.h&&entity.y+hh>w.y){
      const ol=entity.x+hw-w.x, or2=w.x+w.w-entity.x+hw, ot=entity.y+hh-w.y, ob=w.y+w.h-entity.y+hh;
      const mn=Math.min(ol,or2,ot,ob);
      if(mn===ol)entity.x=w.x-hw;
      else if(mn===or2)entity.x=w.x+w.w+hw;
      else if(mn===ot)entity.y=w.y-hh;
      else entity.y=w.y+w.h+hh;
    }
  }
  entity.x=Math.max(30,Math.min(WORLD_W-30,entity.x));
  entity.y=Math.max(30,Math.min(WORLD_H-30,entity.y));
}

// ── DRAW ───────────────────────────────────────────────────
function draw() {
  const cx = Math.round(camera.x), cy = Math.round(camera.y);
  ctx.save();
  ctx.translate(-cx, -cy);

  // Ground
  ctx.fillStyle = '#1c1c14';
  ctx.fillRect(cx, cy, W, H);

  // Grid lines (streets)
  ctx.strokeStyle = '#242418';
  ctx.lineWidth = 1;
  const gs = 120;
  const sx = Math.floor(cx/gs)*gs, sy = Math.floor(cy/gs)*gs;
  for(let x=sx;x<cx+W+gs;x+=gs){ctx.beginPath();ctx.moveTo(x,cy);ctx.lineTo(x,cy+H);ctx.stroke();}
  for(let y=sy;y<cy+H+gs;y+=gs){ctx.beginPath();ctx.moveTo(cx,y);ctx.lineTo(cx+W,y);ctx.stroke();}

  // Zone (Battle Royale)
  if (selectedMode==='br'||currentZone.shrinking) {
    const z = currentZone;
    ctx.save();
    ctx.strokeStyle = '#4488ff';
    ctx.lineWidth = 4;
    ctx.setLineDash([12,8]);
    ctx.strokeRect(z.x, z.y, z.w, z.h);
    ctx.setLineDash([]);
    // Police icons along border
    const step = 80;
    for(let px=z.x;px<z.x+z.w;px+=step){ drawCop(px, z.y-12); drawCop(px, z.y+z.h+12, true); }
    for(let py=z.y;py<z.y+z.h;py+=step){ drawCop(z.x-12, py); drawCop(z.x+z.w+12, py); }
    ctx.restore();
  }

  // Walls
  walls.forEach(w => {
    ctx.fillStyle='#2e2c20'; ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.fillStyle='#3a3828'; if(w.w>40){for(let wx=w.x+8;wx<w.x+w.w-16;wx+=22)ctx.fillRect(wx,w.y+4,10,6);}
    ctx.fillStyle='#4a4830'; ctx.fillRect(w.x,w.y,w.w,2);
  });

  // Loot
  lootItems.forEach(loot => {
    const pulse = Math.sin(loot.pulse||0)*3;
    let color, label;
    switch(loot.type){
      case'health': color='#44dd66';label='HP';break;
      case'shield': color='#4488ff';label='SH';break;
      case'shotgun':color='#ffaa44';label='SG';break;
      case'bounce': color='#44ffcc';label='BG';break;
      case'golden': color='#ffdd00';label='★';break;
      default:color='#888';label='?';
    }
    ctx.save();
    if(loot.type==='golden'){ctx.shadowColor='#ffdd00';ctx.shadowBlur=18+pulse;}
    ctx.fillStyle=color;
    ctx.beginPath();ctx.arc(loot.x,loot.y,7+pulse*.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,loot.x,loot.y);
    ctx.restore();
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha=p.life/45;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Bullets
  bullets.forEach(b => {
    ctx.save();
    ctx.fillStyle=b.color||'#fff';ctx.shadowColor=b.color||'#fff';ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // Remote players
  Object.values(remotePlayers).forEach(p => { if(p.alive!==false) drawCharacter(p, false); });

  // My player
  if (myPlayer?.alive) drawCharacter({...myPlayer, name:getMyName(), skin:selectedSkin, golden:goldenActive}, true);

  ctx.restore();

  // Minimap
  drawMinimap();

  // Crosshair
  if (myPlayer?.alive) drawCrosshair();
}

function drawCharacter(entity, isMe) {
  const x = entity.x, y = entity.y;
  const skin = SKINS[entity.skin||0]||SKINS[0];
  const golden = entity.golden;

  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(entity.angle+(Math.PI/2));

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath();ctx.ellipse(2,6,9,5,0,0,Math.PI*2);ctx.fill();

  if (golden) {
    // Golden character - glowing
    const gc = GOLDEN_COLORS[golden]||'#ffff00';
    ctx.shadowColor=gc;ctx.shadowBlur=20;
    ctx.fillStyle=gc;
    ctx.beginPath();ctx.arc(0,-4,13,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.beginPath();ctx.arc(0,-8,6,0,Math.PI*2);ctx.fill();
    const icon={plasma:'⚡',web:'◎',blade:'✦'}[golden]||'★';
    ctx.restore();
    ctx.save();ctx.translate(x,y);
    ctx.fillStyle=gc;ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(icon,0,-4);
    ctx.restore();
    // HP bar
    ctx.save();ctx.translate(x,y);
    drawHpBar(entity, 0, -28, skin.color);
    ctx.restore();
    return;
  }

  // Body
  ctx.fillStyle=skin.color;
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(-10,-10,20,22,[10,10,6,6]);
  else ctx.rect(-10,-10,20,22);
  ctx.fill();

  // Hood
  ctx.beginPath();ctx.arc(0,-8,9,0,Math.PI*2);ctx.fill();
  // Face
  ctx.fillStyle='#c8a080';ctx.beginPath();ctx.arc(0,-8,6,0,Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-2.5,-9.5,1.3,0,Math.PI*2);ctx.arc(2.5,-9.5,1.3,0,Math.PI*2);ctx.fill();
  // Gun
  ctx.fillStyle='#333';ctx.fillRect(4,-2.5,16,5);
  ctx.restore();

  // HP bar + name
  ctx.save();ctx.translate(x,y);
  drawHpBar(entity, 0, -28, skin.color);
  ctx.fillStyle=isMe?'#ffdd44':'#ddd';
  ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText(entity.name||'', 0, -30);
  ctx.restore();
}

function drawHpBar(entity, ox, oy, color) {
  const bw=30, bh=4, hp=Math.max(0,entity.hp||0)/150;
  ctx.fillStyle='#222';ctx.fillRect(ox-bw/2,oy,bw,bh);
  ctx.fillStyle=hp>.5?'#44dd66':hp>.25?'#ffcc00':'#ee3333';
  ctx.fillRect(ox-bw/2,oy,bw*hp,bh);
}

function drawCop(x, y, flip) {
  ctx.save();ctx.translate(x,y);if(flip)ctx.scale(1,-1);
  ctx.fillStyle='#2244aa';ctx.fillRect(-5,-8,10,12);
  ctx.fillStyle='#1a336e';ctx.fillRect(-6,-12,12,5);
  ctx.fillStyle='#c8a080';ctx.beginPath();ctx.arc(0,-12,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawCrosshair() {
  const mx=mouse.x,my=mouse.y;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(mx-10,my);ctx.lineTo(mx-4,my);
  ctx.moveTo(mx+4,my);ctx.lineTo(mx+10,my);
  ctx.moveTo(mx,my-10);ctx.lineTo(mx,my-4);
  ctx.moveTo(mx,my+4);ctx.lineTo(mx,my+10);
  ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.2)';
  ctx.beginPath();ctx.arc(mx,my,5,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

function drawMinimap() {
  const mm = document.getElementById('minimap');
  const mctx = mm.getContext('2d');
  const mw=120,mh=90,sx=mw/WORLD_W,sy=mh/WORLD_H;
  mctx.clearRect(0,0,mw,mh);
  mctx.fillStyle='#111';mctx.fillRect(0,0,mw,mh);
  // Walls
  mctx.fillStyle='#2a2a1c';
  walls.forEach(w=>mctx.fillRect(w.x*sx,w.y*sy,Math.max(1,w.w*sx),Math.max(1,w.h*sy)));
  // Zone
  if(selectedMode==='br'){mctx.strokeStyle='#4488ff';mctx.lineWidth=1;mctx.strokeRect(currentZone.x*sx,currentZone.y*sy,currentZone.w*sx,currentZone.h*sy);}
  // Remote players
  Object.values(remotePlayers).forEach(p=>{
    if(!p.alive)return;
    mctx.fillStyle=SKINS[p.skin||0].color;
    mctx.fillRect(p.x*sx-2,p.y*sy-2,4,4);
  });
  // Me
  if(myPlayer){mctx.fillStyle='#ffcc00';mctx.fillRect(myPlayer.x*sx-3,myPlayer.y*sy-3,6,6);}
}

// Init minimap canvas
const mmEl = document.getElementById('minimap');
mmEl.width=120;mmEl.height=90;
</script>
